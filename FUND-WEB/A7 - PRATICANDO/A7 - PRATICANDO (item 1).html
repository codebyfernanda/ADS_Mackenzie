<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pergunta SP</title>
</head>
<body>

<script>
    let resposta = prompt("Você mora na cidade de São Paulo? (sim/não)");

    resposta = resposta.toLowerCase().trim();

    let imagem = "";

    if (resposta === "sim") {
        imagem = "sim.jpg"; 
    } else {
        imagem = "não.jpg"; 
    }

    document.write(`<h2>Imagem carregada:</h2>`);
    document.write(`<img src="${imagem}" width="400">`);
</script>

</body>
</html>
