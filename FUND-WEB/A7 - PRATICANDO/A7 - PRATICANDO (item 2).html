<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Notas e Média</title>
</head>
<body>

<script>
    let notas = [];
    
    for (let i = 1; i <= 4; i++) {
        let nota = parseFloat(prompt(`Digite a nota ${i}:`));
        notas.push(nota);
    }

    alert("Notas digitadas: " + notas.join(", "));

    let soma = 0;
    for (let n of notas) {
        soma += n;
    }
    let media = soma / notas.length;

    document.write(`<h2>Notas digitadas:</h2> ${notas.join(" — ")}`);
    document.write(`<h2>Média:</h2> ${media.toFixed(2)}`);
</script>

</body>
</html>
